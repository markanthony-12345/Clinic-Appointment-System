
<style>
#erd-wrap { padding: 0.5rem 0; }
#erd svg { width: 100%; }
</style>
<div id="erd-wrap"><div id="erd"></div></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a52' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#B5D4F4' : '#0C447C',
  },
});
const diagram = `erDiagram
  users {
    int user_id PK
    varchar username
    varchar password
    varchar fullname
    enum role
    timestamp created_at
  }
  patients {
    int patient_id PK
    varchar fullname
    int age
    varchar gender
    text address
    varchar contact_number
    timestamp date_registered
  }
  doctors {
    int doctor_id PK
    varchar doctor_name
    varchar specialization
    text schedule
    int max_patients
  }
  appointments {
    int appointment_id PK
    int patient_id FK
    int doctor_id FK
    datetime appointment_date
    enum status
    enum lab_required
    timestamp created_at
  }
  laboratory {
    int lab_id PK
    int patient_id FK
    varchar laboratory_type
    enum status
    text result
    timestamp created_at
  }
  medicines {
    int medicine_id PK
    int patient_id FK
    varchar medicine_name
    varchar dosage
    varchar frequency
    varchar duration
    enum status
    timestamp prescription_date
  }
  payments {
    int payment_id PK
    int patient_id FK
    decimal consultation_fee
    decimal laboratory_fee
    decimal amount_paid
    decimal total_amount
    enum payment_status
    timestamp payment_date
  }
  patients ||--o{ appointments : "books"
  doctors  ||--o{ appointments : "handles"
  patients ||--o{ laboratory   : "has"
  patients ||--o{ medicines    : "prescribed"
  patients ||--|| payments     : "billed"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
